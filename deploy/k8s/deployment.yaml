apiVersion: apps/v1
kind: Deployment
metadata:
  name: gaia-server
  namespace: gaia-default
  labels:
    app: gaia-server
    version: v0.1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gaia-server
  template:
    metadata:
      labels:
        app: gaia-server
        version: v0.1
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      # cgroup v2 isolation - enable in production
      # runtimeClassName: gaia-rt-class
      containers:
        - name: gaia-server
          image: ghcr.io/xxkylesteenxx/gaia-server:v0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8080
              name: health
          env:
            - name: GAIA_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GAIA_CLUSTER_ID
              value: "gaia-cluster-main"
            - name: GAIA_PQC_ENABLED
              value: "true"
            - name: GAIA_STATE_ROOT
              value: "/gaia-state"
          volumeMounts:
            - name: gaia-state
              mountPath: /gaia-state
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "8Gi"
      volumes:
        - name: gaia-state
          emptyDir: {}
          # Production: replace with PersistentVolumeClaim
